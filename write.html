---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>写 — 不断线</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Serif SC", serif; background: #faf9f6; color: #2c2c2c; line-height: 1.8; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #aaa; margin-bottom: 24px; }
  h3.sec { font-size: 14px; color: #6b8f71; margin-bottom: 12px; margin-top: 20px; }
  label.field { display: block; margin-bottom: 16px; }
  label.field span { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
  input[type="text"], input[type="date"], input[type="time"], textarea, select {
    width: 100%; padding: 10px 12px; border: 1px solid #e0ddd6; border-radius: 6px;
    font: inherit; font-size: 15px; background: #fff; color: #2c2c2c; transition: border 0.2s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #6b8f71; }
  textarea { resize: vertical; min-height: 60px; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
  /* Type tabs */
  .type-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .type-tabs label {
    font-size: 14px; padding: 8px 18px; border-radius: 20px;
    border: 1px solid #e0ddd6; cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .type-tabs label:has(input:checked) { background: #6b8f71; color: #fff; border-color: #6b8f71; }
  .type-tabs input { display: none; }
  /* Section picker */
  .checks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .checks label {
    font-size: 13px; padding: 6px 14px; border-radius: 20px;
    border: 1px solid #e0ddd6; cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .checks label:has(input:checked) { background: #6b8f71; color: #fff; border-color: #6b8f71; }
  .checks input { display: none; }
  .optional { display: none; }
  .optional.show { display: block; }
  .form-section { display: none; }
  .form-section.active { display: block; }
  .btn {
    display: block; width: 100%; padding: 14px; border: none; border-radius: 8px;
    font: inherit; font-size: 16px; font-weight: 600; cursor: pointer;
    background: #6b8f71; color: #fff; transition: background 0.2s; margin-top: 24px;
  }
  .btn:hover { background: #5a7d60; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .msg { margin-top: 12px; font-size: 14px; text-align: center; }
  .msg.ok { color: #6b8f71; }
  .msg.err { color: #a06060; }
  .setup { margin-bottom: 24px; padding: 16px; background: #f5f3ef; border-radius: 8px; font-size: 13px; }
  .setup input { margin-top: 8px; }
  .setup a { color: #6b8f71; }
  .quiet { font-size: 12px; color: #bbb; text-align: center; margin-top: 16px; }
  .back { font-size: 13px; color: #aaa; display: inline-block; margin-bottom: 20px; }
  .warn-type-picks { display: flex; gap: 8px; margin-bottom: 12px; }
  .warn-type-picks label {
    font-size: 12px; padding: 4px 12px; border-radius: 4px; cursor: pointer;
    border: 1px solid #e0ddd6; user-select: none;
  }
  .warn-type-picks label:has(input:checked) { font-weight: 600; }
  .warn-type-picks label.jie:has(input:checked) { background: #f0e6e6; color: #a06060; border-color: #a06060; }
  .warn-type-picks label.mian:has(input:checked) { background: #e6f0e8; color: #5a8060; border-color: #5a8060; }
  .warn-type-picks label.shi:has(input:checked) { background: #e8ecf0; color: #607090; border-color: #607090; }
  .warn-type-picks label.gui:has(input:checked) { background: #f0ece6; color: #908060; border-color: #908060; }
  .warn-type-picks input { display: none; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1b19; color: #d8d4cc; }
    input, textarea, select { background: #2a2926; border-color: #3a3836; color: #d8d4cc; }
    .setup { background: #242320; }
    .type-tabs label, .checks label { border-color: #3a3836; color: #999; }
    .type-tabs label:has(input:checked), .checks label:has(input:checked) { background: #6b8f71; color: #fff; border-color: #6b8f71; }
    hr { border-top-color: #333; }
    .warn-type-picks label { border-color: #3a3836; }
  }
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="back">&larr; 回到首页</a>
  <h1>写</h1>
  <div class="sub">写一句也算一日。</div>

  <div class="setup" id="setup">
    <b>首次使用需要设置 GitHub Token</b>（只需一次）<br>
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=shrimpdiary" target="_blank">点这里生成 Token</a>
    → 勾选 repo → Generate → 复制粘贴：
    <input type="text" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
    <button onclick="saveToken()" style="margin-top:8px;padding:6px 16px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;">保存</button>
  </div>

  <!-- 选择写什么 -->
  <div class="type-tabs">
    <label><input type="radio" name="type" value="daily" checked onchange="switchType(this.value)"> 日课</label>
    <label><input type="radio" name="type" value="weekly" onchange="switchType(this.value)"> 周省</label>
    <label><input type="radio" name="type" value="monthly" onchange="switchType(this.value)"> 月省</label>
    <label><input type="radio" name="type" value="note" onchange="switchType(this.value)"> 札记</label>
    <label><input type="radio" name="type" value="warning" onchange="switchType(this.value)"> 自警录</label>
  </div>

  <!-- ═══ 日课 ═══ -->
  <div class="form-section active" id="form-daily">
    <h3 class="sec">必填</h3>
    <div class="row">
      <label class="field"><span>昨晚入睡</span><input type="time" id="d-sleep"></label>
      <label class="field"><span>今天起床</span><input type="time" id="d-wake"></label>
    </div>
    <div class="row">
      <label class="field"><span>睡眠质量</span><select id="d-sq"><option>很好</option><option selected>普通</option><option>差</option></select></label>
      <label class="field"><span>精神状态</span><select id="d-energy"><option>很好</option><option selected>普通</option><option>差</option></select></label>
    </div>
    <label class="field"><span>今日一句</span><textarea id="d-oneline" rows="2" placeholder="今天最想留下的一句话"></textarea></label>
    <hr>
    <h3 class="sec">选填 · 今天想写哪些？</h3>
    <div class="checks" id="d-checks">
      <label><input type="checkbox" data-s="event"> 今日记事</label>
      <label><input type="checkbox" data-s="stuck"> 今日卡点</label>
      <label><input type="checkbox" data-s="good"> 今日一善</label>
      <label><input type="checkbox" data-s="learn"> 今日所得</label>
      <label><input type="checkbox" data-s="escape"> 今日一逃</label>
      <label><input type="checkbox" data-s="fear"> 今日一惧</label>
      <label><input type="checkbox" data-s="anger"> 今日一怒</label>
      <label><input type="checkbox" data-s="envy"> 今日一羡</label>
      <label><input type="checkbox" data-s="thought"> 今日一念</label>
      <label><input type="checkbox" data-s="body"> 今日身体</label>
      <label><input type="checkbox" data-s="relation"> 今日关系</label>
      <label><input type="checkbox" data-s="reading"> 今日读/看</label>
      <label><input type="checkbox" data-s="tomorrow"> 明日一事</label>
      <label><input type="checkbox" data-s="dwarn"> 一句话自警</label>
    </div>
    <div class="optional" data-id="event"><label class="field"><span>今日记事</span><textarea placeholder="今天发生了什么小事？"></textarea></label></div>
    <div class="optional" data-id="stuck"><label class="field"><span>今日卡点</span><textarea placeholder="今天卡住我的问题是什么？"></textarea></label></div>
    <div class="optional" data-id="good"><label class="field"><span>今日一善</span><textarea placeholder="今天做得还可以的一点？"></textarea></label></div>
    <div class="optional" data-id="learn"><label class="field"><span>今日所得</span><textarea placeholder="今天得到的认识或观察？"></textarea></label></div>
    <div class="optional" data-id="escape"><label class="field"><span>今日一逃</span><textarea placeholder="今天逃避了什么？"></textarea></label></div>
    <div class="optional" data-id="fear"><label class="field"><span>今日一惧</span><textarea placeholder="今天害怕什么？"></textarea></label></div>
    <div class="optional" data-id="anger"><label class="field"><span>今日一怒</span><textarea placeholder="今天为什么生气？"></textarea></label></div>
    <div class="optional" data-id="envy"><label class="field"><span>今日一羡</span><textarea placeholder="今天羡慕了谁？"></textarea></label></div>
    <div class="optional" data-id="thought"><label class="field"><span>今日一念</span><textarea placeholder="今天反复出现的念头？"></textarea></label></div>
    <div class="optional" data-id="body"><label class="field"><span>今日身体</span><textarea placeholder="身体有什么信号？"></textarea></label></div>
    <div class="optional" data-id="relation"><label class="field"><span>今日关系</span><textarea placeholder="和别人相处中有什么触动？"></textarea></label></div>
    <div class="optional" data-id="reading"><label class="field"><span>今日读/看</span><textarea placeholder="今天看到什么让我有想法？"></textarea></label></div>
    <div class="optional" data-id="tomorrow"><label class="field"><span>明日一事</span><textarea placeholder="明天只做的一件小事？"></textarea></label></div>
    <div class="optional" data-id="dwarn"><label class="field"><span>一句话自警</span><textarea placeholder="从今天的问题里提炼一句提醒"></textarea></label></div>
  </div>

  <!-- ═══ 周省 ═══ -->
  <div class="form-section" id="form-weekly">
    <label class="field"><span>哪一周（如：第18周）</span><input type="text" id="w-week" placeholder="18"></label>
    <label class="field"><span>本周总况</span><textarea id="w-summary" placeholder="简单回顾这一周"></textarea></label>
    <label class="field"><span>本周反复出现的问题</span><textarea id="w-problems"></textarea></label>
    <label class="field"><span>本周做得较好的一点</span><textarea id="w-good"></textarea></label>
    <label class="field"><span>本周最大的情绪来源</span><textarea id="w-emotion"></textarea></label>
    <label class="field"><span>本周最值得保留的一句话</span><textarea id="w-quote" rows="2"></textarea></label>
    <label class="field"><span>下周只改一个习惯</span><textarea id="w-habit" rows="2"></textarea></label>
    <label class="field"><span>给下周自己的警句</span><textarea id="w-warn" rows="2"></textarea></label>
  </div>

  <!-- ═══ 月省 ═══ -->
  <div class="form-section" id="form-monthly">
    <label class="field"><span>哪个月（如：5）</span><input type="text" id="m-month" placeholder="5"></label>
    <label class="field"><span>本月总评</span><textarea id="m-summary"></textarea></label>
    <label class="field"><span>本月三事</span><textarea id="m-events" placeholder="1.\n2.\n3."></textarea></label>
    <label class="field"><span>本月三卡点</span><textarea id="m-stucks" placeholder="1.\n2.\n3."></textarea></label>
    <label class="field"><span>本月三善</span><textarea id="m-goods" placeholder="1.\n2.\n3."></textarea></label>
    <label class="field"><span>本月所得</span><textarea id="m-learn"></textarea></label>
    <label class="field"><span>下月一戒</span><textarea id="m-stop" rows="2"></textarea></label>
    <label class="field"><span>下月一志</span><textarea id="m-goal" rows="2"></textarea></label>
  </div>

  <!-- ═══ 札记 ═══ -->
  <div class="form-section" id="form-note">
    <label class="field"><span>标题</span><input type="text" id="n-title" placeholder="随便起个名"></label>
    <label class="field"><span>正文</span><textarea id="n-body" rows="8" placeholder="想到什么写什么"></textarea></label>
  </div>

  <!-- ═══ 自警录 ═══ -->
  <div class="form-section" id="form-warning">
    <div class="warn-type-picks">
      <label class="jie"><input type="radio" name="wtype" value="戒" checked> 戒</label>
      <label class="mian"><input type="radio" name="wtype" value="勉"> 勉</label>
      <label class="shi"><input type="radio" name="wtype" value="识"> 识</label>
      <label class="gui"><input type="radio" name="wtype" value="规"> 规</label>
    </div>
    <label class="field"><span>自警语</span><input type="text" id="warn-text" placeholder="事未做时，不可先败于想象。"></label>
    <label class="field"><span>具体问题</span><textarea id="warn-problem" rows="2" placeholder="今天发生了什么导致这个认识？"></textarea></label>
    <label class="field"><span>重复模式</span><textarea id="warn-pattern" rows="2" placeholder="去掉细节，这个问题的本质是？"></textarea></label>
  </div>

  <button class="btn" onclick="publish()">发布</button>
  <div class="msg" id="msg"></div>
  <div class="quiet">发布后 1 分钟网站自动更新。</div>
</div>

<script>
const REPO = "m1n969/blog";
const ST = { event:"今日记事", stuck:"今日卡点", good:"今日一善", learn:"今日所得",
  escape:"今日一逃", fear:"今日一惧", anger:"今日一怒", envy:"今日一羡",
  thought:"今日一念", body:"今日身体", relation:"今日关系", reading:"今日读/看",
  tomorrow:"明日一事", dwarn:"一句话自警" };

let currentType = "daily";
function switchType(t) {
  currentType = t;
  document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
  document.getElementById('form-' + t)?.classList.add('active');
}

// Toggle optional daily sections
document.querySelectorAll('#d-checks [data-s]').forEach(cb => {
  cb.addEventListener('change', () => {
    const el = document.querySelector(`.optional[data-id="${cb.dataset.s}"]`);
    if (el) el.classList.toggle('show', cb.checked);
  });
});

function getToken() { return localStorage.getItem('gh_token') || ''; }
function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (t) { localStorage.setItem('gh_token', t); document.getElementById('setup').style.display = 'none'; alert('Token 已保存！'); }
}
if (getToken()) document.getElementById('setup').style.display = 'none';

function now() {
  const d = new Date();
  return { y: d.getFullYear(), mm: d.getMonth()+1, dd: d.getDate(),
    ds: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` };
}

function val(id) { return (document.getElementById(id)?.value || '').trim(); }

function buildDaily() {
  const { mm, dd, ds } = now();
  let md = `---\nlayout: post\ntitle: "${mm}月${dd}日"\ndate: ${ds}\ncategory: 日课\n---\n\n`;
  md += `## 睡眠记录\n\n昨晚入睡：${val('d-sleep')||'?'}\n\n今天起床：${val('d-wake')||'?'}\n\n`;
  md += `睡眠质量：${val('d-sq')}\n\n精神状态：${val('d-energy')}\n\n`;
  md += `## 今日一句\n\n${val('d-oneline')||'（无）'}\n`;
  document.querySelectorAll('.optional.show').forEach(div => {
    const t = div.querySelector('textarea')?.value?.trim();
    if (t) md += `\n---\n\n## ${ST[div.dataset.id]||div.dataset.id}\n\n${t}\n`;
  });
  return { md, path: `_posts/${ds}-日课.md`, msg: `日课 ${ds}` };
}

function buildWeekly() {
  const { y } = now(); const w = val('w-week') || '?';
  let md = `---\nlayout: post\ntitle: "${y}年第${w}周 周省"\ncategory: 周省\n---\n\n`;
  const fields = [['本周总况','w-summary'],['本周反复出现的问题','w-problems'],['本周做得较好的一点','w-good'],
    ['本周最大的情绪来源','w-emotion'],['本周最值得保留的一句话','w-quote'],['下周只改一个习惯','w-habit'],['给下周自己的警句','w-warn']];
  fields.forEach(([title, id]) => { const v = val(id); if (v) md += `## ${title}\n\n${v}\n\n`; else md += `## ${title}\n\n\n\n`; });
  return { md, path: `_weekly/${y}-w${w.padStart(2,'0')}.md`, msg: `周省 第${w}周` };
}

function buildMonthly() {
  const { y } = now(); const m = val('m-month') || '?';
  let md = `---\nlayout: post\ntitle: "${y}年${m}月 月省"\ncategory: 月省\n---\n\n`;
  const fields = [['本月总评','m-summary'],['本月三事','m-events'],['本月三卡点','m-stucks'],
    ['本月三善','m-goods'],['本月所得','m-learn'],['下月一戒','m-stop'],['下月一志','m-goal']];
  fields.forEach(([title, id]) => { const v = val(id); md += `## ${title}\n\n${v||''}\n\n`; });
  return { md, path: `_monthly/${y}-${m.padStart(2,'0')}.md`, msg: `月省 ${y}年${m}月` };
}

function buildNote() {
  const { ds } = now(); const title = val('n-title') || '札记';
  let md = `---\nlayout: post\ntitle: "${title}"\ndate: ${ds}\ncategory: 札记\n---\n\n${val('n-body')}\n`;
  const slug = ds + '-' + title.replace(/[^a-zA-Z0-9\u4e00-\u9fff]+/g, '-').slice(0, 30);
  return { md, path: `_posts/${slug}.md`, msg: `札记：${title}` };
}

function buildWarning() {
  const wtype = document.querySelector('input[name="wtype"]:checked')?.value || '戒';
  const text = val('warn-text'); const problem = val('warn-problem'); const pattern = val('warn-pattern');
  if (!text) { alert('请填写自警语'); return null; }
  const tagClass = { '戒':'jie','勉':'mian','识':'shi','规':'gui' }[wtype] || 'jie';
  // Append to warnings.md
  const entry = `\n<span class="warn-tag ${tagClass}">${wtype}</span> ${text}\n\n` +
    (problem ? `> 具体问题：${problem}\n>\n` : '') +
    (pattern ? `> 重复模式：${pattern}\n` : '') + `\n---\n`;
  return { append: entry, path: 'warnings.md', msg: `自警：${text.slice(0,20)}` };
}

async function commitFile(token, path, content, message, sha) {
  const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch: "main" };
  if (sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res;
}

async function publish() {
  const token = getToken();
  if (!token) { alert('请先设置 GitHub Token'); return; }
  const msg = document.getElementById('msg');
  const btn = document.querySelector('.btn');
  btn.disabled = true; msg.textContent = '发布中…'; msg.className = 'msg';

  try {
    if (currentType === 'warning') {
      const w = buildWarning(); if (!w) { btn.disabled = false; msg.textContent = ''; return; }
      // Fetch existing warnings.md, append
      const check = await fetch(`https://api.github.com/repos/${REPO}/contents/${w.path}`, { headers: { Authorization: `token ${token}` } });
      if (!check.ok) throw new Error('找不到 warnings.md');
      const existing = await check.json();
      const old = decodeURIComponent(escape(atob(existing.content)));
      // Insert before the closing comment
      const marker = '<!-- 格式：';
      let updated;
      if (old.includes(marker)) {
        updated = old.replace(marker, w.append + '\n' + marker);
      } else {
        updated = old + w.append;
      }
      const res = await commitFile(token, w.path, updated, w.msg, existing.sha);
      if (res.ok) { msg.textContent = '自警语已添加！'; msg.className = 'msg ok'; }
      else throw new Error((await res.json()).message);
    } else {
      const builders = { daily: buildDaily, weekly: buildWeekly, monthly: buildMonthly, note: buildNote };
      const { md, path, msg: cmsg } = builders[currentType]();
      // Check existing
      let sha = null;
      const check = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { headers: { Authorization: `token ${token}` } });
      if (check.ok) sha = (await check.json()).sha;
      const res = await commitFile(token, path, md, cmsg, sha);
      if (res.ok) { msg.textContent = '发布成功！1 分钟后网站更新。'; msg.className = 'msg ok'; }
      else throw new Error((await res.json()).message);
    }
  } catch (e) {
    msg.textContent = '发布失败：' + e.message; msg.className = 'msg err';
  } finally { btn.disabled = false; }
}
</script>
</body>
</html>
