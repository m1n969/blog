---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
    {% if page.category %}<div class="post-meta-line">{{ page.category }}</div>{% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <div class="post-footer">
    <a href="{{ '/' | relative_url }}">&larr; 回到首页</a>
  </div>
</article>
